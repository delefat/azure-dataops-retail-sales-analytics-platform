name: Python Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  run-tests:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: |
          pip install pytest

      - name: Run tests
        run: |
          pytest tests/